<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<title>在庫管理システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.2);
  --primary:#185FA5;--primary-dark:#0C447C;--primary-bg:#E6F1FB;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-text:#27500A;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-text:#633806;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
  --gray:#5F5E5A;--gray-bg:#F1EFE8;
  --f1:#185FA5;--f1-bg:#E6F1FB;--f1-text:#0C447C;
  --f6:#7B3FA0;--f6-bg:#F3EAFA;--f6-text:#5A1F82;
  --r:10px;--rl:14px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --primary-bg:#0c2a44;
  --green-bg:#1a2e08;--green-text:#97C459;
  --amber-bg:#2e1f06;--amber-text:#FAC775;
  --red-bg:#2e0f0f;--red-text:#F09595;
  --gray-bg:#2c2c2a;
  --f1-bg:#0c2a44;--f1-text:#85B7EB;
  --f6-bg:#2a1040;--f6-text:#C89CE8;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overscroll-behavior:none}

/* ── Name screen ── */
#name-screen{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:32px 24px}
#name-screen.hidden{display:none}
.nc{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:340px;text-align:center}
.nc-logo{font-size:44px;margin-bottom:12px}
.nc-title{font-size:18px;font-weight:700;margin-bottom:4px;color:#1a1a1a}
.nc-sub{font-size:12px;color:#666;margin-bottom:20px;line-height:1.6}
.nc-input{width:100%;padding:12px 14px;border:1.5px solid rgba(0,0,0,0.2);border-radius:10px;font-size:15px;margin-bottom:10px;color:#1a1a1a;font-family:inherit}
.nc-input:focus{outline:2px solid var(--primary);border-color:var(--primary)}
.nc-btn{width:100%;padding:14px;font-size:15px;font-weight:700;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit}
.nc-btn:active{opacity:.85}

/* ── App ── */
#app{display:none;flex-direction:column;min-height:100vh}
#app.show{display:flex}

.topbar{padding:calc(var(--st)+10px) 16px 10px;background:var(--primary);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:700;color:#fff}
.topbar-left{display:flex;align-items:center;gap:8px}
.user-info{display:flex;align-items:center;gap:7px}
.user-av{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;flex-shrink:0}
.user-nm{font-size:11px;color:rgba(255,255,255,0.9);font-weight:500;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.35)}
.sdot.ok{background:#fff}
.sdot.syncing{background:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Floor bar ── */
.floor-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:50px;z-index:9}
.floor-btn{flex:1;padding:10px 0;font-size:13px;font-weight:600;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:3px solid transparent;transition:all .15s;font-family:inherit}
.floor-btn.active[data-floor="all"]{color:var(--primary);border-bottom-color:var(--primary)}
.floor-btn.active[data-floor="1"]{color:var(--f1);border-bottom-color:var(--f1)}
.floor-btn.active[data-floor="6"]{color:var(--f6);border-bottom-color:var(--f6)}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:92px;z-index:8;overflow-x:auto}
.tab{padding:9px 0;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;flex:1;text-align:center;font-weight:500}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.content{padding:14px;flex:1}
.view{display:none}.view.active{display:block}

/* ── Floor tag ── */
.floor-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.floor-tag[data-floor="1"]{background:var(--f1-bg);color:var(--f1-text)}
.floor-tag[data-floor="6"]{background:var(--f6-bg);color:var(--f6-text)}

/* ── Stats ── */
.stats-header{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg2);border-radius:var(--r);padding:11px 13px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-value{font-size:20px;font-weight:700}
.sv-r{color:var(--red)}.sv-a{color:var(--amber)}.sv-g{color:var(--green)}

/* ── Floor summary ── */
.floor-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.fs-card{border-radius:var(--rl);padding:13px 14px;border:1.5px solid transparent;cursor:pointer}
.fs-card[data-floor="1"]{background:var(--f1-bg);border-color:rgba(24,95,165,0.25)}
.fs-card[data-floor="6"]{background:var(--f6-bg);border-color:rgba(123,63,160,0.25)}
.fs-floor{font-size:11px;font-weight:700;margin-bottom:8px}
.fs-card[data-floor="1"] .fs-floor{color:var(--f1-text)}
.fs-card[data-floor="6"] .fs-floor{color:var(--f6-text)}
.fs-nums{display:flex;gap:10px}
.fs-num{text-align:center}
.fs-n{font-size:18px;font-weight:700}
.fs-l{font-size:10px;color:var(--text2);margin-top:1px}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.ok{background:var(--green-bg);color:var(--green-text)}
.badge.low{background:var(--amber-bg);color:var(--amber-text)}
.badge.critical{background:var(--red-bg);color:var(--red-text)}
.badge.out{background:var(--gray-bg);color:var(--gray)}
.stale-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--amber-bg);color:var(--amber-text)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn:active{opacity:.65}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.blue{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.gn{background:var(--green);color:#fff;border-color:var(--green)}
.btn.rd{border-color:var(--red);color:var(--red)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn.bl{width:100%;margin-bottom:10px}

/* ── Qty control ── */
.qc{display:inline-flex;align-items:center;border:1.5px solid var(--border2);border-radius:var(--r);overflow:hidden}
.qbtn{width:40px;height:40px;border:none;background:var(--bg2);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1}
.qbtn.minus:active{background:var(--red-bg);color:var(--red)}
.qbtn.plus:active{background:var(--green-bg);color:var(--green)}
.qval{min-width:56px;text-align:center;font-size:15px;font-weight:700;padding:0 4px;border-left:1px solid var(--border);border-right:1px solid var(--border);height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:color .3s}
.qval.fu{color:var(--green)}.qval.fd{color:var(--red)}

/* ── Item card ── */
.icard{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:10px;border-left:4px solid transparent}
.icard[data-floor="1"]{border-left-color:var(--f1)}
.icard[data-floor="6"]{border-left-color:var(--f6)}
.icard.stale-warn[data-floor="1"]{border-left-color:var(--amber)}
.icard.stale-warn[data-floor="6"]{border-left-color:var(--amber)}
.icard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.iname{font-size:15px;font-weight:700;line-height:1.3}
.imeta{font-size:11px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ibc{font-size:10px;color:var(--text3);font-family:monospace;margin-top:2px}
.restock-row{font-size:11px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.restock-row.stale{color:var(--amber)}
.pbar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;width:100%;margin-top:10px}
.pfill{height:100%;border-radius:2px;transition:width .3s}

/* ── Scan FAB ── */
.fab{position:fixed;bottom:calc(var(--sb)+20px);right:18px;width:62px;height:62px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(24,95,165,.35);z-index:50}
.fab:active{transform:scale(.92)}

/* ── Scanner overlay ── */
.sov{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column}
.sov.open{display:flex}
.sov-hd{padding:calc(var(--st)+12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.7)}
.sov-hd h2{color:#fff;font-size:15px;font-weight:700}
#svid{width:100%;flex:1;object-fit:cover;display:block}
.sui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.sfr{width:260px;height:150px;border:2px solid rgba(255,255,255,.7);border-radius:12px;position:relative}
.sc{position:absolute;width:22px;height:22px;border-color:var(--primary);border-style:solid}
.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:8px 0 0 0}
.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 8px 0 0}
.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 8px}
.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 8px 0}
.sln{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);animation:sl 2s linear infinite}
@keyframes sl{0%{top:10%}100%{top:90%}}
.shint{position:absolute;bottom:210px;left:0;right:0;text-align:center;color:rgba(255,255,255,.75);font-size:13px}
.sbot{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-radius:20px 20px 0 0;padding:18px 16px calc(var(--sb)+16px);pointer-events:all;min-height:150px}
.sdrag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}

/* ── Modal ── */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center}
.mov.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;padding:20px 16px calc(var(--sb)+16px);max-height:92vh;overflow-y:auto}
.mdrag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit}
.field input:focus,.field select:focus{outline:2px solid var(--primary);border-color:var(--primary)}
.mact{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* ── Floor selector ── */
.floor-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.floor-sel-btn{padding:12px;border-radius:var(--r);border:2px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.floor-sel-btn.active[data-floor="1"]{background:var(--f1-bg);border-color:var(--f1);color:var(--f1-text)}
.floor-sel-btn.active[data-floor="6"]{background:var(--f6-bg);border-color:var(--f6);color:var(--f6-text)}

/* ── Order ── */
.osec{background:var(--bg2);border-radius:var(--rl);padding:14px;margin-bottom:14px}
.osec h2{font-size:14px;font-weight:700;margin-bottom:12px}
.oitem{background:var(--bg);border:1px solid var(--border);border-left:4px solid transparent;border-radius:var(--r);padding:10px 12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.oitem[data-floor="1"]{border-left-color:var(--f1)}
.oitem[data-floor="6"]{border-left-color:var(--f6)}
.oitem.stale-rec{background:var(--amber-bg)}
.oitem:last-child{margin-bottom:0}
.oiname{font-size:13px;font-weight:700}
.oisub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.5}
.oiqty{font-size:14px;font-weight:700;color:var(--primary);white-space:nowrap;flex-shrink:0}
.obtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:4px}

/* ── Log ── */
.logitem{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
.logitem:last-child{border-bottom:none}
.ltime{font-size:10px;color:var(--text3);min-width:58px;line-height:1.5;flex-shrink:0}
.lwho{font-size:11px;font-weight:700;color:var(--primary);min-width:46px;white-space:nowrap;flex-shrink:0}
.lact{font-size:13px}.lsub{font-size:11px;color:var(--text2);margin-top:2px}

/* ── Misc ── */
.empty{text-align:center;padding:40px 16px;color:var(--text2);font-size:13px;line-height:1.8}
.notice{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-bottom:14px;line-height:1.6}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:120px;padding:9px 12px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.toolbar select{padding:9px 8px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--text);font-family:inherit}
.cbadge{display:inline-block;background:#E24B4A;color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;font-weight:700;margin-left:2px;vertical-align:middle}
.toast{position:fixed;bottom:calc(var(--sb)+90px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.sp{height:80px}
.section-divider{font-size:11px;font-weight:700;color:var(--text2);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

@media print{body *{visibility:hidden !important}#pdft,#pdft *{visibility:visible !important}#pdft{position:fixed !important;inset:0 !important;width:100% !important;background:#fff !important;padding:0 !important;z-index:9999 !important}}
</style>
</head>
<body>

<!-- PDF template -->
<div id="pdft" style="display:none;font-family:'Helvetica Neue',Arial,sans-serif;color:#111;background:#fff;padding:36px 44px;min-height:100vh">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #111">
    <div><div style="font-size:20px;font-weight:700">発注リスト</div><div style="font-size:11px;color:#555;margin-top:3px" id="pdf-date"></div></div>
    <div style="text-align:right;font-size:11px;color:#555">作成者: <strong id="pdf-author"></strong></div>
  </div>
  <div style="display:flex;gap:14px;margin-bottom:22px" id="pdf-summary"></div>
  <div id="pdf-body"></div>
  <div style="margin-top:24px;padding-top:12px;border-top:.5px solid #ccc;display:flex;justify-content:space-between;font-size:10px;color:#888">
    <span>在庫管理システムより自動生成</span><span id="pdf-total"></span>
  </div>
  <div style="margin-top:28px">
    <div style="font-size:11px;color:#555;margin-bottom:18px">承認欄</div>
    <div style="display:flex;gap:36px">
      <div style="border-bottom:.5px solid #999;width:100px;padding-bottom:3px"><span style="font-size:10px;color:#888">担当者</span></div>
      <div style="border-bottom:.5px solid #999;width:100px;padding-bottom:3px"><span style="font-size:10px;color:#888">確認者</span></div>
      <div style="border-bottom:.5px solid #999;width:100px;padding-bottom:3px"><span style="font-size:10px;color:#888">承認者</span></div>
    </div>
  </div>
</div>

<!-- Name screen -->
<div id="name-screen">
  <div class="nc">
    <div class="nc-logo">📦</div>
    <div class="nc-title">在庫管理システム</div>
    <div class="nc-sub">お名前を入力して入室してください。<br>操作履歴にお名前が記録されます。</div>
    <input class="nc-input" id="uinput" type="text" placeholder="例: 田中" maxlength="20" autocomplete="off">
    <button class="nc-btn" onclick="enterApp()">入室する</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:20px">📦</span>
      <h1>在庫管理</h1>
    </div>
    <div class="user-info">
      <div class="sdot" id="sdot"></div>
      <div class="user-av" id="uav"></div>
      <div class="user-nm" id="unm"></div>
    </div>
  </div>

  <div class="floor-bar">
    <button class="floor-btn active" data-floor="all" onclick="setFloor('all')">全フロア</button>
    <button class="floor-btn" data-floor="1" onclick="setFloor('1')">1階</button>
    <button class="floor-btn" data-floor="6" onclick="setFloor('6')">6階</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-dashboard" onclick="showTab('dashboard')">ダッシュボード</div>
    <div class="tab" id="tab-order" onclick="showTab('order')">発注 <span class="cbadge" id="ocnt" style="display:none"></span></div>
    <div class="tab" id="tab-log" onclick="showTab('log')">履歴</div>
    <div class="tab" id="tab-settings" onclick="showTab('settings')">設定</div>
  </div>

  <div class="view active content" id="view-dashboard">
    <div id="floor-summary-wrap"></div>
    <div id="stats-wrap"></div>
    <div class="toolbar">
      <input type="text" id="search" placeholder="品目名・バーコードで検索…" oninput="renderCards()">
      <select id="fst" onchange="renderCards()">
        <option value="">すべての状態</option>
        <option value="critical">発注必要</option>
        <option value="low">在庫少</option>
        <option value="ok">正常</option>
        <option value="out">在庫切れ</option>
        <option value="stale">1ヶ月経過</option>
      </select>
    </div>
    <div id="ilist"></div>
    <div class="sp"></div>
  </div>

  <div class="view content" id="view-order">
    <div id="olist-wrap"></div>
    <div class="obtns">
      <button class="btn sm" onclick="copyOrder()">📋 コピー</button>
      <button class="btn sm blue" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn sm gn" onclick="exportPDF()">🖨 PDF</button>
    </div>
    <div class="sp"></div>
  </div>

  <div class="view content" id="view-log">
    <div id="llist"></div>

<div class="toast" id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  設定
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SK='inv:data', LK='inv:logs';
const FLOORS=['1','6'];
const FL={'1':'1階','6':'6階'};

const DEF=[
  {id:1,name:"コピー用紙 A4",cat:"用紙類",floor:"1",barcode:"4901480101016",stock:8,min:20,orderQty:100,unit:"冊",lastRestocked:null},
  {id:2,name:"ボールペン（青）",cat:"文具",floor:"1",barcode:"4901681200019",stock:3,min:10,orderQty:30,unit:"本",lastRestocked:null},
  {id:3,name:"付箋 Mサイズ",cat:"文具",floor:"6",barcode:"",stock:15,min:10,orderQty:20,unit:"個",lastRestocked:null},
  {id:4,name:"ゴミ袋 45L",cat:"清掃用品",floor:"1",barcode:"",stock:0,min:5,orderQty:50,unit:"枚",lastRestocked:null},
  {id:5,name:"トイレットペーパー",cat:"清掃用品",floor:"6",barcode:"4901750803018",stock:12,min:10,orderQty:48,unit:"ロール",lastRestocked:null},
  {id:6,name:"単三電池",cat:"電子機器",floor:"6",barcode:"",stock:4,min:8,orderQty:24,unit:"本",lastRestocked:null},
  {id:7,name:"マスク（不織布）",cat:"その他",floor:"6",barcode:"",stock:30,min:50,orderQty:200,unit:"枚",lastRestocked:null},
  {id:8,name:"台所洗剤",cat:"清掃用品",floor:"1",barcode:"",stock:2,min:3,orderQty:6,unit:"本",lastRestocked:null},
];

let items=[],logs=[],nextId=100,currentUser='';
let editTarget=null,scanInputTarget=null,scannerMode='use';
let sStream=null,sDet=null,sActive=false,lastBC=null;
let currentFloor='all';
const pend={};

// ━━ Storage (localStorage — ブラウザ内永続化) ━━
function saveData(){try{localStorage.setItem(SK,JSON.stringify({items,nextId}));}catch(e){}}
function saveLogs(){try{localStorage.setItem(LK,JSON.stringify(logs.slice(-300)));}catch(e){}}
function loadData(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      const d=JSON.parse(r);items=d.items||[];nextId=d.nextId||100;
      items.forEach(i=>{if(!i.floor)i.floor='1';if(i.lastRestocked===undefined)i.lastRestocked=null;});
    }else{items=JSON.parse(JSON.stringify(DEF));nextId=20;saveData();}
  }catch(e){items=JSON.parse(JSON.stringify(DEF));nextId=20;}
}
function loadLogs(){try{const r=localStorage.getItem(LK);logs=r?JSON.parse(r):[];}catch(e){logs=[];}}

// ━━ Helpers ━━
function setSS(s){const d=document.getElementById('sdot');d.className='sdot'+(s==='ok'?' ok':s==='syncing'?' syncing':'');}

function getStatus(i){
  if(i.stock===0)return'out';
  if(i.stock<i.min)return'critical';
  if(i.stock<i.min*1.5)return'low';
  return'ok';
}
function isStale(i){
  if(!i.lastRestocked)return false;
  const diff=Date.now()-new Date(i.lastRestocked).getTime();
  if(diff<30*24*60*60*1000)return false;
  return i.min>0?(i.stock/i.min)*100>50:false;
}
function fmtDate(iso){
  if(!iso)return'未記録';
  return new Date(iso).toLocaleDateString('ja-JP',{year:'numeric',month:'numeric',day:'numeric'});
}
function daysSince(iso){
  if(!iso)return null;
  return Math.floor((Date.now()-new Date(iso).getTime())/(24*60*60*1000));
}

const SL={ok:'正常',low:'在庫少',critical:'発注必要',out:'在庫切れ'};
const BC={ok:'#3B6D11',low:'#EF9F27',critical:'#E24B4A',out:'#B4B2A9'};

function addLog(action,detail){
  const now=new Date();
  logs.push({time:now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),date:now.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}),who:currentUser,action,detail});
}

// ━━ Enter app ━━
function enterApp(){
  const n=document.getElementById('uinput').value.trim();
  if(!n){toast('名前を入力してください');return;}
  currentUser=n;
  document.getElementById('name-screen').classList.add('hidden');
  const app=document.getElementById('app');app.style.display='flex';app.classList.add('show');
  document.getElementById('uav').textContent=n.charAt(0).toUpperCase();
  document.getElementById('unm').textContent=n;
  loadData();loadLogs();
  addLog('入室',`${n}さんが入室しました`);
  saveLogs();setSS('ok');renderAll();
  setInterval(()=>{loadData();setSS('ok');renderAll();},30000);
}
document.getElementById('uinput').addEventListener('keydown',e=>{if(e.key==='Enter')enterApp();});

// ━━ Floor ━━
function filteredItems(){return currentFloor==='all'?items:items.filter(i=>i.floor===currentFloor);}
function setFloor(fl){
  currentFloor=fl;
  document.querySelectorAll('.floor-btn').forEach(b=>b.classList.toggle('active',b.dataset.floor===fl));
  renderAll();
}

// ━━ Render floor summary ━━
function renderFloorSummary(){
  const wrap=document.getElementById('floor-summary-wrap');
  if(currentFloor!=='all'){wrap.innerHTML='';return;}
  wrap.innerHTML='<div class="floor-summary">'+FLOORS.map(fl=>{
    const fi=items.filter(i=>i.floor===fl);
    const crit=fi.filter(i=>['critical','out'].includes(getStatus(i))).length;
    const stale=fi.filter(i=>isStale(i)).length;
    const ok=fi.filter(i=>getStatus(i)==='ok'&&!isStale(i)).length;
    return`<div class="fs-card" data-floor="${fl}" onclick="setFloor('${fl}')">
      <div class="fs-floor">${FL[fl]}</div>
      <div class="fs-nums">
        <div class="fs-num"><div class="fs-n" style="color:var(--red)">${crit}</div><div class="fs-l">要発注</div></div>
        <div class="fs-num"><div class="fs-n" style="color:var(--amber)">${stale}</div><div class="fs-l">推奨</div></div>
        <div class="fs-num"><div class="fs-n" style="color:var(--green)">${ok}</div><div class="fs-l">正常</div></div>
        <div class="fs-num"><div class="fs-n">${fi.length}</div><div class="fs-l">合計</div></div>
      </div>
    </div>`;
  }).join('')+'</div>';
}

// ━━ Render stats ━━
function renderStats(){
  const fi=filteredItems();
  const crit=fi.filter(i=>['critical','out'].includes(getStatus(i))).length;
  const stale=fi.filter(i=>isStale(i)).length;
  const ok=fi.filter(i=>getStatus(i)==='ok'&&!isStale(i)).length;
  const label=currentFloor==='all'?'全フロア':FL[currentFloor];
  document.getElementById('stats-wrap').innerHTML=`
    <div class="stats-header">${label}</div>
    <div class="stats">
      <div class="stat"><div class="stat-label">管理品目数</div><div class="stat-value">${fi.length}</div></div>
      <div class="stat"><div class="stat-label">発注必要・切れ</div><div class="stat-value sv-r">${crit}</div></div>
      <div class="stat"><div class="stat-label">発注推奨（1ヶ月経過）</div><div class="stat-value sv-a">${stale}</div></div>
      <div class="stat"><div class="stat-label">正常</div><div class="stat-value sv-g">${ok}</div></div>
    </div>`;
}

// ━━ Item card ━━
function itemCard(i){
  const s=getStatus(i),stale=isStale(i);
  const pct=i.min>0?Math.min(100,Math.round(i.stock/i.min*100)):100;
  const ds=daysSince(i.lastRestocked);
  const restockTxt=i.lastRestocked?`補充日: ${fmtDate(i.lastRestocked)}（${ds}日前）`:'補充日: 未記録';
  return`<div class="icard${stale?' stale-warn':''}" data-floor="${i.floor}">
    <div class="icard-top">
      <div style="flex:1;min-width:0">
        <div class="iname">${i.name}</div>
        <div class="imeta">
          <span class="floor-tag" data-floor="${i.floor}">${FL[i.floor]}</span>
          <span>${i.cat}</span>
          <span style="color:var(--text3)">発注点: ${i.min}${i.unit}</span>
        </div>
        <div class="restock-row${stale?' stale':''}">${restockTxt}${stale?` <span class="stale-badge">1ヶ月経過 追加発注推奨</span>`:''}</div>
        <div class="ibc">${i.barcode?'🔖 '+i.barcode:'バーコード未登録'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        <span class="badge ${s}">${SL[s]}</span>
        <button class="btn sm" onclick="openEditModal(${i.id})" style="font-size:11px">⚙</button>
      </div>
    </div>
    <div class="qc">
      <button class="qbtn minus" onclick="chg(${i.id},-1)">−</button>
      <div class="qval" id="qv${i.id}">${i.stock} ${i.unit}</div>
      <button class="qbtn plus" onclick="chg(${i.id},1)">＋</button>
    </div>
    <div class="pbar"><div class="pfill" id="pb${i.id}" style="width:${pct}%;background:${BC[s]}"></div></div>
  </div>`;
}

// ━━ Render cards ━━
function renderCards(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fs=document.getElementById('fst').value;
  const base=filteredItems();
  const f=base.filter(i=>{
    const s=getStatus(i);
    if(fs==='stale')return isStale(i);
    if(fs&&s!==fs)return false;
    if(q&&!i.name.toLowerCase().includes(q)&&!(i.barcode||'').includes(q))return false;
    return true;
  });
  const el=document.getElementById('ilist');
  if(!f.length){el.innerHTML='<div class="empty">該当する品目がありません</div>';return;}
  let html='';
  if(currentFloor==='all'){
    FLOORS.forEach(fl=>{
      const gf=f.filter(i=>i.floor===fl);
      if(!gf.length)return;
      html+=`<div class="section-divider">${FL[fl]}（${gf.length}品目）</div>`;
      html+=gf.map(itemCard).join('');
    });
  }else{
    html=f.map(itemCard).join('');
  }
  el.innerHTML=html;
}

// ━━ Render order ━━
function renderOrder(){
  const allNeed=items.filter(i=>['critical','out'].includes(getStatus(i))||isStale(i));
  const cnt=document.getElementById('ocnt');
  if(allNeed.length){cnt.style.display='';cnt.textContent=allNeed.length;}else cnt.style.display='none';
  const wrap=document.getElementById('olist-wrap');
  const need=currentFloor==='all'?allNeed:allNeed.filter(i=>i.floor===currentFloor);
  if(!need.length){wrap.innerHTML='<div class="osec"><div class="empty">発注が必要な品目はありません</div></div>';return;}
  const renderItem=i=>{
    const stale=isStale(i),s=getStatus(i),isUrgent=['critical','out'].includes(s);
    const icon=s==='out'?'🚫':stale&&!isUrgent?'📅':'⚠️';
    const ds=daysSince(i.lastRestocked);
    return`<div class="oitem${stale&&!isUrgent?' stale-rec':''}" data-floor="${i.floor}">
      <div style="font-size:16px;flex-shrink:0;margin-top:1px">${icon}</div>
      <div style="flex:1">
        <div class="oiname">${i.name}</div>
        <div class="oisub">${FL[i.floor]} / ${i.cat}${i.barcode?' / '+i.barcode:''}<br>現在 ${i.stock}${i.unit} → 発注点 ${i.min}${i.unit}<br>補充日: ${fmtDate(i.lastRestocked)}${ds!==null?' ('+ds+'日前)':''}${stale?' <strong>1ヶ月経過</strong>':''}</div>
        ${stale&&!isUrgent?'<span class="stale-badge" style="margin-top:4px;display:inline-flex">追加発注推奨</span>':''}
      </div>
      <div class="oiqty">${i.orderQty}${i.unit}</div>
    </div>`;
  };
  if(currentFloor==='all'){
    let html='';
    FLOORS.forEach(fl=>{
      const gn=need.filter(i=>i.floor===fl);
      if(!gn.length)return;
      html+=`<div class="osec"><h2>${FL[fl]}（${gn.length}件）</h2>${gn.map(renderItem).join('')}</div>`;
    });
    wrap.innerHTML=html;
  }else{
    wrap.innerHTML=`<div class="osec"><h2>${FL[currentFloor]}（${need.length}件）</h2>${need.map(renderItem).join('')}</div>`;
  }
}

// ━━ Render log ━━
function renderLog(){
  const el=document.getElementById('llist');
  if(!logs.length){el.innerHTML='<div class="empty">操作履歴がありません</div>';return;}
  el.innerHTML=[...logs].reverse().map(l=>`<div class="logitem">
    <div class="ltime">${l.date||''}<br>${l.time}</div>
    <div class="lwho">${l.who||'—'}</div>
    <div><div class="lact">${l.action}</div><div class="lsub">${l.detail}</div></div>
  </div>`).join('');
}

// ━━ Render settings ━━
function renderSettings(){
  const base=currentFloor==='all'?items:items.filter(i=>i.floor===currentFloor);
  const el=document.getElementById('slist');
  if(!base.length){el.innerHTML='<div class="empty">品目がありません</div>';return;}
  const card=i=>`<div class="icard" data-floor="${i.floor}">
    <div class="icard-top">
      <div>
        <div class="iname">${i.name}</div>
        <div class="imeta"><span class="floor-tag" data-floor="${i.floor}">${FL[i.floor]}</span><span>${i.cat}</span></div>
        <div class="imeta" style="margin-top:3px">発注点:${i.min}${i.unit} / 発注数:${i.orderQty}${i.unit}</div>
        <div class="restock-row${isStale(i)?' stale':''}">補充日: ${fmtDate(i.lastRestocked)}${daysSince(i.lastRestocked)!==null?' ('+daysSince(i.lastRestocked)+'日前)':''}${isStale(i)?' <span class="stale-badge">1ヶ月経過</span>':''}</div>
        <div class="ibc">${i.barcode?'🔖 '+i.barcode:`<span style="color:var(--red)">バーコード未登録</span>`}</div>
      </div>
      <button class="btn sm" onclick="openEditModal(${i.id})">⚙ 編集</button>
    </div>
  </div>`;
  let html='';
  if(currentFloor==='all'){
    FLOORS.forEach(fl=>{
      const gi=base.filter(i=>i.floor===fl);
      if(!gi.length)return;
      html+=`<div class="section-divider">${FL[fl]}（${gi.length}品目）</div>`+gi.map(card).join('');
    });
  }else{html=base.map(card).join('');}
  el.innerHTML=html;
}

function renderAll(){renderFloorSummary();renderStats();renderCards();renderOrder();const at=document.querySelector('.tab.active');if(at?.id==='tab-log')renderLog();if(at?.id==='tab-settings')renderSettings();}

// ━━ Stock change ━━
function chg(id,delta){
  const i=items.find(x=>x.id===id);if(!i)return;
  const b=i.stock;i.stock=Math.max(0,i.stock+delta);if(i.stock===b)return;
  if(delta>0)i.lastRestocked=new Date().toISOString();
  const ve=document.getElementById('qv'+id),be=document.getElementById('pb'+id);
  if(ve){ve.textContent=i.stock+' '+i.unit;ve.classList.remove('fu','fd');void ve.offsetWidth;ve.classList.add(delta>0?'fu':'fd');setTimeout(()=>ve.classList.remove('fu','fd'),600);}
  const s=getStatus(i);
  if(be){const p=i.min>0?Math.min(100,Math.round(i.stock/i.min*100)):100;be.style.width=p+'%';be.style.background=BC[s];}
  addLog(`${delta>0?'入荷':'使用'}: ${i.name}`,`[${FL[i.floor]}] ${b}→${i.stock}${i.unit} (${delta>0?'+':''}${delta})`);
  if(s==='critical'||s==='out')addLog(`⚠ 発注検知: ${i.name}`,`[${FL[i.floor]}] 在庫 ${i.stock}${i.unit} が発注点 ${i.min}${i.unit} を下回りました`);
  clearTimeout(pend[id]);pend[id]=setTimeout(()=>{setSS('syncing');saveData();saveLogs();setSS('ok');renderFloorSummary();renderStats();renderOrder();},600);
}

// ━━ Tab ━━
function showTab(t){
  ['dashboard','order','log','settings'].forEach(n=>{
    document.getElementById('view-'+n)?.classList.toggle('active',n===t);
    document.getElementById('tab-'+n)?.classList.toggle('active',n===t);
  });
  document.getElementById('fab').style.display=(t==='dashboard')?'flex':'none';
  if(t==='log')renderLog();if(t==='settings')renderSettings();
}

// ━━ Modals ━━
function selFloor(btn,fl,hiddenId){
  const parent=btn.closest('.floor-sel');
  parent.querySelectorAll('.floor-sel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(hiddenId).value=fl;
}
function openAddModal(){
  if(currentFloor!=='all'){
    document.querySelectorAll('#modal-add .floor-sel-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector(`#modal-add .floor-sel-btn[data-floor="${currentFloor}"]`)?.classList.add('active');
    document.getElementById('nfl').value=currentFloor;
  }
  document.getElementById('modal-add').classList.add('open');
}
function openEditModal(id){
  const i=items.find(x=>x.id===id);editTarget=id;
  document.getElementById('enlbl').textContent=i.name;
  document.getElementById('eb').value=i.barcode||'';
  document.getElementById('em').value=i.min;
  document.getElementById('eo').value=i.orderQty;
  document.getElementById('eu').value=i.unit;
  document.getElementById('efl').value=i.floor||'1';
  document.querySelectorAll('#modal-edit .floor-sel-btn').forEach(b=>b.classList.toggle('active',b.dataset.floor===(i.floor||'1')));
  document.getElementById('modal-edit').classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mov').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

function addItem(){
  const name=document.getElementById('nn').value.trim();if(!name){toast('品目名を入力してください');return;}
  const bc=document.getElementById('nb').value.trim();
  if(bc&&items.find(i=>i.barcode===bc)){toast('このバーコードは登録済みです');return;}
  const fl=document.getElementById('nfl').value||'1';
  const item={id:nextId++,name,cat:document.getElementById('nc').value,floor:fl,barcode:bc,
    stock:parseInt(document.getElementById('ns').value)||0,
    min:parseInt(document.getElementById('nm').value)||1,
    orderQty:parseInt(document.getElementById('no').value)||1,
    unit:document.getElementById('nu').value||'個',lastRestocked:null};
  items.push(item);
  addLog(`品目追加: ${name}`,`[${FL[fl]}] 在庫:${item.stock}${item.unit} 発注点:${item.min}${item.unit}`);
  setSS('syncing');saveData();saveLogs();setSS('ok');
  closeModal('modal-add');
  document.getElementById('nn').value='';document.getElementById('nb').value='';
  renderAll();toast(`「${name}」を${FL[fl]}に追加しました`);
}

function saveEdit(){
  const i=items.find(x=>x.id===editTarget);
  const bc=document.getElementById('eb').value.trim();
  if(bc&&bc!==i.barcode&&items.find(x=>x.barcode===bc&&x.id!==editTarget)){toast('このバーコードは登録済みです');return;}
  const oldFloor=i.floor;
  i.floor=document.getElementById('efl').value||'1';
  i.barcode=bc;
  i.min=parseInt(document.getElementById('em').value)||1;
  i.orderQty=parseInt(document.getElementById('eo').value)||1;
  i.unit=document.getElementById('eu').value||i.unit;
  const moved=oldFloor!==i.floor?` → ${FL[i.floor]}に移動`:'';
  addLog(`設定更新: ${i.name}`,`[${FL[i.floor]}] 発注点:${i.min}${i.unit}${moved}`);
  setSS('syncing');saveData();saveLogs();setSS('ok');
  closeModal('modal-edit');renderAll();toast('保存しました');
}

function deleteItem(){
  const i=items.find(x=>x.id===editTarget);
  if(!confirm(`「${i.name}」を削除しますか？`))return;
  items=items.filter(x=>x.id!==editTarget);
  addLog(`品目削除: ${i.name}`,`[${FL[i.floor]}] 削除`);
  saveData();saveLogs();closeModal('modal-edit');renderAll();toast('削除しました');
}

// ━━ Barcode Scanner ━━
async function openScanner(mode){
  if(!('BarcodeDetector' in window)){toast('このブラウザはスキャン非対応です（Chrome推奨）');return;}
  scannerMode=mode||'use';lastBC=null;
  document.getElementById('sbot').style.display='none';
  document.getElementById('sov').classList.add('open');
  try{
    sStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    const v=document.getElementById('svid');v.srcObject=sStream;await v.play();
    sDet=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code']});
    sActive=true;detectLoop();
  }catch(e){closeScanner();toast('カメラへのアクセスが許可されていません');}
}
function startInputScan(tid){scanInputTarget=document.getElementById(tid);scannerMode='input';openScanner('input');}
async function detectLoop(){
  if(!sActive)return;
  const v=document.getElementById('svid');
  try{if(v.readyState>=2){const c=await sDet.detect(v);if(c.length){const cd=c[0].rawValue;if(cd!==lastBC){lastBC=cd;handleScan(cd);}}}}catch(e){}
  if(sActive)setTimeout(detectLoop,300);
}
function handleScan(code){
  if(scannerMode==='input'){if(scanInputTarget)scanInputTarget.value=code;closeScanner();toast('バーコード取得: '+code);return;}
  const found=items.find(i=>i.barcode===code);
  const bot=document.getElementById('sbot'),src=document.getElementById('src');
  bot.style.display='block';
  if(found){
    const s=getStatus(found);
    src.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="font-size:14px;font-weight:700">${found.name}</div>
      <span class="floor-tag" data-floor="${found.floor}">${FL[found.floor]}</span>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">${found.cat} / <span class="badge ${s}">${SL[s]}</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">現在の在庫</div>
        <div class="qc">
          <button class="qbtn minus" onclick="scanChg(${found.id},-1)">−</button>
          <div class="qval" id="sqv">${found.stock} ${found.unit}</div>
          <button class="qbtn plus" onclick="scanChg(${found.id},1)">＋</button>
        </div>
      </div>
      <button class="btn sm primary" onclick="lastBC=null;document.getElementById('sbot').style.display='none'">続けてスキャン</button>
    </div>
    <button class="btn sm" style="width:100%;margin-top:12px" onclick="closeScanner()">✓ 完了</button>`;
  }else{
    src.innerHTML=`<div style="text-align:center;padding:8px 0">
      <div style="font-family:monospace;font-size:13px;background:var(--bg2);padding:6px 12px;border-radius:8px;display:inline-block;margin-bottom:10px">${code}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">このバーコードは登録されていません</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn sm primary" onclick="regFromScan('${code}')">＋ この商品を登録</button>
        <button class="btn sm" onclick="lastBC=null;document.getElementById('sbot').style.display='none'">再スキャン</button>
      </div>
    </div>`;
  }
}
function scanChg(id,delta){chg(id,delta);const i=items.find(x=>x.id===id);const el=document.getElementById('sqv');if(el)el.textContent=i.stock+' '+i.unit;}
function regFromScan(code){closeScanner();document.getElementById('nb').value=code;openAddModal();setTimeout(()=>document.getElementById('nn').focus(),300);}
function closeScanner(){
  sActive=false;
  if(sStream){sStream.getTracks().forEach(t=>t.stop());sStream=null;}
  document.getElementById('sov').classList.remove('open');
  document.getElementById('svid').srcObject=null;
  lastBC=null;renderAll();
}

// ━━ Export ━━
function getNeedItems(){
  const base=currentFloor==='all'?items:items.filter(i=>i.floor===currentFloor);
  return base.filter(i=>['critical','out'].includes(getStatus(i))||isStale(i));
}

function copyOrder(){
  const need=getNeedItems();
  if(!need.length){toast('発注が必要な品目はありません');return;}
  const grouped={};
  FLOORS.forEach(fl=>{const g=need.filter(i=>i.floor===fl);if(g.length)grouped[fl]=g;});
  let text='【発注リスト】\n'+new Date().toLocaleDateString('ja-JP')+'\n\n';
  Object.entries(grouped).forEach(([fl,g])=>{
    text+=`■ ${FL[fl]}\n`;
    g.forEach((i,n)=>{
      const stale=isStale(i),ds=daysSince(i.lastRestocked);
      text+=`  ${n+1}. ${i.name}（${i.cat}）\n     現在: ${i.stock}${i.unit} / 発注数: ${i.orderQty}${i.unit}${i.barcode?'\n     BC: '+i.barcode:''}\n     補充日: ${fmtDate(i.lastRestocked)}${ds!==null?' ('+ds+'日前)':''}${stale?' ← 1ヶ月経過 追加発注推奨':''}\n`;
    });
    text+='\n';
  });
  navigator.clipboard.writeText(text.trim()).then(()=>toast('コピーしました')).catch(()=>toast('コピー失敗'));
}

function exportCSV(){
  const need=getNeedItems();
  if(!need.length){toast('発注が必要な品目はありません');return;}
  const rows=[['フロア','品目名','バーコード','カテゴリ','現在庫','発注点','発注数量','単位','状態','前回補充日','経過日数','備考']];
  need.forEach(i=>rows.push([FL[i.floor],i.name,i.barcode||'',i.cat,i.stock,i.min,i.orderQty,i.unit,SL[getStatus(i)],fmtDate(i.lastRestocked),daysSince(i.lastRestocked)??'',isStale(i)?'1ヶ月経過 追加発注推奨':'']));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='発注リスト_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.csv';
  a.click();
}

function exportPDF(){
  const need=getNeedItems();
  if(!need.length){toast('発注が必要な品目はありません');return;}
  const now=new Date();
  document.getElementById('pdf-date').textContent='出力日時: '+now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})+' '+now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('pdf-author').textContent=currentUser;
  document.getElementById('pdf-total').textContent=`発注品目数: ${need.length}件`;
  const oN=need.filter(i=>getStatus(i)==='out').length,cN=need.filter(i=>getStatus(i)==='critical').length,sN=need.filter(i=>isStale(i)&&!['critical','out'].includes(getStatus(i))).length;
  document.getElementById('pdf-summary').innerHTML=`
    <div style="background:#FCEBEB;border-radius:8px;padding:10px 14px;flex:1"><div style="font-size:10px;font-weight:700;color:#A32D2D;margin-bottom:3px">在庫切れ</div><div style="font-size:20px;font-weight:700;color:#A32D2D">${oN}<span style="font-size:11px;margin-left:3px">品目</span></div></div>
    <div style="background:#FAEEDA;border-radius:8px;padding:10px 14px;flex:1"><div style="font-size:10px;font-weight:700;color:#854F0B;margin-bottom:3px">発注必要</div><div style="font-size:20px;font-weight:700;color:#854F0B">${cN}<span style="font-size:11px;margin-left:3px">品目</span></div></div>
    <div style="background:#FAEEDA;border-radius:8px;padding:10px 14px;flex:1"><div style="font-size:10px;font-weight:700;color:#854F0B;margin-bottom:3px">追加発注推奨</div><div style="font-size:20px;font-weight:700;color:#854F0B">${sN}<span style="font-size:11px;margin-left:3px">品目</span></div></div>`;
  const sc={critical:'#A32D2D',out:'#5F5E5A'},sb={critical:'#FCEBEB',out:'#F1EFE8'};
  let bodyHtml='',rowIdx=0;
  FLOORS.forEach(fl=>{
    const gn=need.filter(i=>i.floor===fl);if(!gn.length)return;
    bodyHtml+=`<tr><td colspan="9" style="padding:10px 8px 6px;font-size:11px;font-weight:700;color:#444;border-bottom:1px solid #ddd;background:#f9f9f9">${FL[fl]}</td></tr>`;
    gn.forEach(i=>{
      const s=getStatus(i),stale=isStale(i),ds=daysSince(i.lastRestocked);
      const staleLabel=stale?'<span style="background:#FAEEDA;color:#854F0B;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:3px">追加推奨</span>':'';
      const statusCell=['critical','out'].includes(s)?`<span style="background:${sb[s]};color:${sc[s]};padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600">${SL[s]}</span>`:'<span style="background:#EAF3DE;color:#27500A;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600">正常</span>';
      bodyHtml+=`<tr style="background:${rowIdx%2?'#f9f9f9':'#fff'}">
        <td style="padding:6px 8px 6px 0;color:#888;font-size:11px">${rowIdx+1}</td>
        <td style="padding:6px 8px;font-weight:600">${i.name}</td>
        <td style="padding:6px 8px;font-family:monospace;font-size:11px;color:#555">${i.barcode||'—'}</td>
        <td style="padding:6px 8px;color:#555">${i.cat}</td>
        <td style="padding:6px 8px;text-align:right;color:#A32D2D;font-weight:600">${i.stock} ${i.unit}</td>
        <td style="padding:6px 8px;text-align:right;color:#555">${i.min} ${i.unit}</td>
        <td style="padding:6px 8px;text-align:right;font-weight:700;color:#185FA5">${i.orderQty} ${i.unit}</td>
        <td style="padding:6px 8px;font-size:11px;color:#555">${fmtDate(i.lastRestocked)}${ds!==null?' ('+ds+'日)':''}</td>
        <td style="padding:6px 0 6px 8px">${statusCell}${staleLabel}</td>
      </tr>`;
      rowIdx++;
    });
  });
  document.getElementById('pdf-body').innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="border-bottom:1.5px solid #111">
      <th style="text-align:left;padding:6px 8px 6px 0;font-size:10px;color:#444;width:4%">No.</th>
      <th style="text-align:left;padding:6px 8px;font-size:10px;color:#444;width:18%">品目名</th>
      <th style="text-align:left;padding:6px 8px;font-size:10px;color:#444;width:11%">バーコード</th>
      <th style="text-align:left;padding:6px 8px;font-size:10px;color:#444;width:9%">カテゴリ</th>
      <th style="text-align:right;padding:6px 8px;font-size:10px;color:#444;width:9%">現在庫</th>
      <th style="text-align:right;padding:6px 8px;font-size:10px;color:#444;width:9%">発注点</th>
      <th style="text-align:right;padding:6px 8px;font-size:10px;color:#444;width:10%">発注数量</th>
      <th style="text-align:left;padding:6px 8px;font-size:10px;color:#444;width:14%">前回補充日</th>
      <th style="text-align:left;padding:6px 0 6px 8px;font-size:10px;color:#444;width:16%">状態</th>
    </tr></thead>
    <tbody>${bodyHtml}</tbody>
  </table>`;
  const t=document.getElementById('pdft');t.style.display='block';
  setTimeout(()=>{window.print();setTimeout(()=>{t.style.display='none';},800);},100);
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
