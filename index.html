<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫管理システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-text:#27500A;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-text:#633806;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
  --gray:#5F5E5A;--gray-bg:#F1EFE8;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --blue:#378ADD;--blue-bg:#0c2a44;--blue-text:#85B7EB;
  --green:#639922;--green-bg:#1a2e08;--green-text:#97C459;
  --amber:#EF9F27;--amber-bg:#2e1f06;--amber-text:#FAC775;
  --red:#E24B4A;--red-bg:#2e0f0f;--red-text:#F09595;
  --gray:#888780;--gray-bg:#2c2c2a;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── layout ── */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:700px;margin:0 auto}
.topbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar h1{font-size:16px;font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg);position:sticky;top:53px;z-index:9}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.content{padding:16px;flex:1}
.view{display:none}
.view.active{display:block}

/* ── cards / stats ── */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-value{font-size:22px;font-weight:600}
.stat-value.red{color:var(--red)}
.stat-value.amber{color:var(--amber)}
.stat-value.green{color:var(--green)}

/* ── badge ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.ok{background:var(--green-bg);color:var(--green-text)}
.badge.low{background:var(--amber-bg);color:var(--amber-text)}
.badge.critical{background:var(--red-bg);color:var(--red-text)}
.badge.out{background:var(--gray-bg);color:var(--gray)}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:background 0.15s}
.btn:hover{background:var(--bg2)}
.btn:active{opacity:0.7}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{opacity:0.9}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.green:hover{opacity:0.9}
.btn.red-outline{border-color:var(--red);color:var(--red)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.icon{padding:8px;border-radius:50%;width:36px;height:36px;justify-content:center}

/* ── qty control ── */
.qty-ctrl{display:inline-flex;align-items:center;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.qty-btn{width:36px;height:36px;border:none;background:var(--bg2);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;flex-shrink:0;font-family:inherit}
.qty-btn.minus:active,.qty-btn.minus:hover{background:var(--red-bg);color:var(--red)}
.qty-btn.plus:active,.qty-btn.plus:hover{background:var(--green-bg);color:var(--green)}
.qty-val{min-width:52px;text-align:center;font-size:14px;font-weight:600;padding:0 4px;border-left:1px solid var(--border);border-right:1px solid var(--border);height:36px;display:flex;align-items:center;justify-content:center;transition:color 0.3s;background:var(--bg)}
.qty-val.flash-up{color:var(--green)}
.qty-val.flash-down{color:var(--red)}

/* ── item cards ── */
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.item-card:last-child{margin-bottom:0}
.item-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.item-name{font-size:14px;font-weight:600;line-height:1.3}
.item-cat{font-size:11px;color:var(--text2);margin-top:2px}
.item-barcode{font-size:10px;color:var(--text3);font-family:monospace;margin-top:2px}
.item-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.item-meta{font-size:12px;color:var(--text2)}
.pbar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-top:6px;width:80px}
.pfill{height:100%;border-radius:2px;transition:width 0.3s}

/* ── scan button ── */
.scan-fab{position:fixed;bottom:24px;right:16px;width:60px;height:60px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:50;transition:transform 0.15s}
.scan-fab:active{transform:scale(0.92)}

/* ── scanner overlay ── */
.scanner-overlay{display:none;position:fixed;inset:0;background:#000;z-index:100;flex-direction:column}
.scanner-overlay.open{display:flex}
.scanner-header{padding:16px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.7)}
.scanner-header h2{color:#fff;font-size:16px;font-weight:600}
#scanner-video{width:100%;flex:1;object-fit:cover}
.scanner-ui{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.scan-frame{width:260px;height:160px;border:2px solid rgba(255,255,255,0.8);border-radius:12px;position:relative}
.scan-frame::before,.scan-frame::after{content:'';position:absolute;width:24px;height:24px;border-color:#4af;border-style:solid}
.scan-frame::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:10px 0 0 0}
.scan-frame::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 10px 0}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4af,transparent);animation:scanline 2s linear infinite}
@keyframes scanline{0%{top:10%}100%{top:90%}}
.scanner-hint{position:absolute;bottom:120px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.8);font-size:13px}
.scanner-result{position:absolute;bottom:0;left:0;right:0;background:var(--bg);padding:16px;border-radius:16px 16px 0 0;min-height:140px;pointer-events:all}
.scanner-result h3{font-size:14px;font-weight:600;margin-bottom:12px}
.scanner-result-item{display:flex;align-items:center;justify-content:space-between;gap:12px}
.scanner-result-info{flex:1}
.scanner-result-name{font-size:15px;font-weight:600}
.scanner-result-sub{font-size:12px;color:var(--text2);margin-top:2px}
.scanner-actions{display:flex;gap:8px;margin-top:14px}
.scanner-not-found{text-align:center;padding:16px 0}
.scanner-not-found p{color:var(--text2);font-size:13px;margin-bottom:12px}
.barcode-display{font-family:monospace;font-size:13px;color:var(--text2);background:var(--bg2);padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:10px}

/* ── modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
@media(min-width:500px){.modal-overlay{align-items:center}}
.modal{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;max-height:90vh;overflow-y:auto}
@media(min-width:500px){.modal{border-radius:var(--radius-lg)}}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit}
.field input:focus,.field select:focus{outline:2px solid var(--blue);outline-offset:1px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}

/* ── order list ── */
.order-card{background:var(--bg2);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.order-card h2{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.order-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.order-item:last-child{margin-bottom:0}
.order-item-info{flex:1}
.order-item-name{font-size:13px;font-weight:600}
.order-item-sub{font-size:11px;color:var(--text2);margin-top:2px}
.order-item-qty{font-size:14px;font-weight:700;color:var(--blue);white-space:nowrap}
.order-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

/* ── log ── */
.log-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
.log-item:last-child{border-bottom:none}
.log-time{font-size:11px;color:var(--text3);min-width:72px;white-space:nowrap;padding-top:1px}
.log-who{font-size:11px;font-weight:600;color:var(--blue);min-width:50px;white-space:nowrap;padding-top:1px}
.log-body{flex:1}
.log-action{font-size:13px}
.log-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ── sync ── */
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text2)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border2)}
.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.user-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;background:var(--blue-bg);color:var(--blue-text);font-weight:600}
.notice{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.empty{text-align:center;padding:40px 16px;color:var(--text2);font-size:13px}

/* ── toast ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── toolbar ── */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:120px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.toolbar select{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}

/* ── name screen ── */
#name-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
.name-card{width:100%;max-width:340px}
.name-icon{font-size:48px;margin-bottom:16px}
.name-title{font-size:20px;font-weight:700;margin-bottom:6px}
.name-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.name-input{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-size:16px;background:var(--bg);color:var(--text);font-family:inherit;margin-bottom:10px}
.name-btn{width:100%;padding:12px;font-size:15px;justify-content:center}

@media print{
  body *{visibility:hidden !important}
  #pdf-template,#pdf-template *{visibility:visible !important}
  #pdf-template{position:fixed !important;inset:0 !important;width:100% !important;background:#fff !important;padding:0 !important;margin:0 !important;z-index:99999 !important;color:#111 !important}
}
</style>
</head>
<body>

<!-- PDF template (hidden) -->
<div id="pdf-template" style="display:none;font-family:'Helvetica Neue',Arial,sans-serif;color:#111;background:#fff;padding:40px 48px;min-height:100vh">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid #111">
    <div>
      <div style="font-size:22px;font-weight:700;letter-spacing:-0.5px">発注リスト</div>
      <div style="font-size:12px;color:#555;margin-top:4px" id="pdf-date"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:#555">作成者</div>
      <div style="font-size:13px;font-weight:600" id="pdf-author"></div>
    </div>
  </div>
  <div style="display:flex;gap:16px;margin-bottom:24px" id="pdf-summary"></div>
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead>
      <tr style="border-bottom:1.5px solid #111">
        <th style="text-align:left;padding:7px 8px 7px 0;font-size:10px;font-weight:700;color:#444;width:4%">No.</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:#444;width:22%">品目名</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:#444;width:13%">バーコード</th>
        <th style="text-align:left;padding:7px 8px;font-size:10px;font-weight:700;color:#444;width:12%">カテゴリ</th>
        <th style="text-align:right;padding:7px 8px;font-size:10px;font-weight:700;color:#444;width:11%">現在庫</th>
        <th style="text-align:right;padding:7px 8px;font-size:10px;font-weight:700;color:#444;width:11%">発注点</th>
        <th style="text-align:right;padding:7px 8px;font-size:10px;font-weight:700;color:#444;width:13%">発注数量</th>
        <th style="text-align:center;padding:7px 0 7px 8px;font-size:10px;font-weight:700;color:#444;width:14%">状態</th>
      </tr>
    </thead>
    <tbody id="pdf-tbody"></tbody>
  </table>
  <div style="margin-top:28px;padding-top:14px;border-top:0.5px solid #ccc;display:flex;justify-content:space-between">
    <div style="font-size:10px;color:#888">在庫管理システム（バーコード対応）より自動生成</div>
    <div style="font-size:10px;color:#888" id="pdf-total"></div>
  </div>
  <div style="margin-top:32px">
    <div style="font-size:11px;color:#555;margin-bottom:20px">承認欄</div>
    <div style="display:flex;gap:40px">
      <div style="border-bottom:0.5px solid #999;width:110px;padding-bottom:4px"><span style="font-size:10px;color:#888">担当者</span></div>
      <div style="border-bottom:0.5px solid #999;width:110px;padding-bottom:4px"><span style="font-size:10px;color:#888">確認者</span></div>
      <div style="border-bottom:0.5px solid #999;width:110px;padding-bottom:4px"><span style="font-size:10px;color:#888">承認者</span></div>
    </div>
  </div>
</div>

<!-- Name screen -->
<div id="name-screen">
  <div class="name-card">
    <div class="name-icon">📦</div>
    <div class="name-title">在庫管理システム</div>
    <div class="name-sub">バーコードスキャン対応版<br>名前（ニックネーム）を入力して入室してください</div>
    <input class="name-input" id="username-input" type="text" placeholder="例: 田中" maxlength="20" autocomplete="off">
    <button class="btn primary name-btn" onclick="enterApp()">→ 入室する</button>
    <div style="font-size:11px;color:var(--text3);margin-top:12px">入力した名前は操作履歴に記録されます</div>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:20px">📦</span>
      <h1>在庫管理</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-badge"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">…</span></div>
      <div class="user-chip" id="user-chip"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-dashboard" onclick="showTab('dashboard')">ダッシュボード</div>
    <div class="tab" id="tab-order" onclick="showTab('order')">発注リスト <span id="order-cnt" style="display:none;background:#E24B4A;color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;font-weight:600"></span></div>
    <div class="tab" id="tab-log" onclick="showTab('log')">操作履歴</div>
    <div class="tab" id="tab-settings" onclick="showTab('settings')">設定</div>
  </div>

  <!-- Dashboard -->
  <div class="view active content" id="view-dashboard">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <input type="text" id="search" placeholder="品目名・バーコードで検索…" oninput="renderCards()">
      <select id="filter-status" onchange="renderCards()">
        <option value="">すべて</option>
        <option value="critical">発注必要</option>
        <option value="low">在庫少</option>
        <option value="ok">正常</option>
        <option value="out">在庫切れ</option>
      </select>
      <button class="btn icon" onclick="syncNow(false)" title="同期" aria-label="今すぐ同期">↻</button>
    </div>
    <div id="item-list"></div>
    <div style="height:80px"></div>
  </div>

  <!-- Order -->
  <div class="view content" id="view-order">
    <div class="order-card">
      <h2>⚠️ 発注が必要な品目</h2>
      <div id="order-list"></div>
    </div>
    <div class="order-actions">
      <button class="btn sm" onclick="copyOrder()">📋 テキストコピー</button>
      <button class="btn sm" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn green sm" onclick="exportPDF()">🖨 PDFで出力</button>
    </div>
    <div style="height:80px"></div>
  </div>

  <!-- Log -->
  <div class="view content" id="view-log">
    <div id="log-list"></div>
    <div style="height:80px"></div>
  </div>

  <!-- Settings -->
  <div class="view content" id="view-settings">
    <div class="notice">ℹ️ 品目の追加・バーコードの紐づけはここから行えます。</div>
    <button class="btn primary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="openAddModal()">＋ 新しい品目を追加</button>
    <div id="settings-list"></div>
    <div style="height:80px"></div>
  </div>

  <!-- FAB scan button -->
  <button class="scan-fab" id="scan-fab" onclick="openScanner()" aria-label="バーコードをスキャン">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="7" width="3" height="10"/><rect x="8" y="7" width="1.5" height="10"/><rect x="11.5" y="7" width="3" height="10"/><rect x="17" y="7" width="1" height="10"/><rect x="20" y="7" width="1" height="10"/><rect x="3" y="3" width="4" height="2" rx="1"/><rect x="17" y="3" width="4" height="2" rx="1"/><rect x="3" y="19" width="4" height="2" rx="1"/><rect x="17" y="19" width="4" height="2" rx="1"/></svg>
  </button>
</div>

<!-- Scanner overlay -->
<div class="scanner-overlay" id="scanner-overlay">
  <div class="scanner-header">
    <h2>🔍 バーコードをスキャン</h2>
    <button class="btn sm" style="background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.3)" onclick="closeScanner()">✕ 閉じる</button>
  </div>
  <video id="scanner-video" playsinline muted autoplay></video>
  <div class="scanner-ui">
    <div class="scan-frame"><div class="scan-line"></div></div>
  </div>
  <div class="scanner-hint" id="scanner-hint">バーコードをフレーム内に合わせてください</div>
  <div class="scanner-result" id="scanner-result" style="display:none">
    <div class="modal-drag"></div>
    <div id="scanner-result-content"></div>
  </div>
</div>

<!-- Add item modal -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-drag"></div>
    <h2>品目を追加</h2>
    <div class="field"><label>品目名 *</label><input type="text" id="new-name" placeholder="例: コピー用紙 A4" autocomplete="off"></div>
    <div class="field"><label>カテゴリ</label>
      <select id="new-cat"><option>文具</option><option>用紙類</option><option>清掃用品</option><option>電子機器</option><option>食品・飲料</option><option>その他</option></select>
    </div>
    <div class="field"><label>バーコード（JAN/EANコード）</label><input type="text" id="new-barcode" placeholder="スキャンまたは手入力" inputmode="numeric" autocomplete="off">
      <div style="margin-top:6px"><button class="btn sm" onclick="startBarcodeInputScan()">📷 スキャンして入力</button></div>
    </div>
    <div class="field"><label>現在の在庫数</label><input type="number" id="new-stock" min="0" value="10"></div>
    <div class="field"><label>発注点（この数を下回ると発注リストに追加）</label><input type="number" id="new-min" min="1" value="5"></div>
    <div class="field"><label>発注数量</label><input type="number" id="new-oqty" min="1" value="20"></div>
    <div class="field"><label>単位</label><input type="text" id="new-unit" value="個"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-add')">キャンセル</button>
      <button class="btn primary" onclick="addItem()">追加する</button>
    </div>
  </div>
</div>

<!-- Edit item modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-drag"></div>
    <h2>設定を変更</h2>
    <div id="edit-name-label" style="font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text2)"></div>
    <div class="field"><label>バーコード</label><input type="text" id="edit-barcode" inputmode="numeric" autocomplete="off">
      <div style="margin-top:6px"><button class="btn sm" onclick="startBarcodeEditScan()">📷 スキャンして変更</button></div>
    </div>
    <div class="field"><label>発注点</label><input type="number" id="edit-min" min="1"></div>
    <div class="field"><label>発注数量</label><input type="number" id="edit-oqty" min="1"></div>
    <div class="field"><label>単位</label><input type="text" id="edit-unit"></div>
    <div class="modal-actions">
      <button class="btn red-outline" onclick="deleteItem()">削除</button>
      <button class="btn" onclick="closeModal('modal-edit')">キャンセル</button>
      <button class="btn primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Storage (localStorage as shared fallback; swap for Firebase/Supabase if needed) ──
const STORAGE_KEY = 'inv_v2:data';
const LOG_KEY = 'inv_v2:logs';

const DEFAULT_ITEMS = [
  {id:1,name:"コピー用紙 A4",cat:"用紙類",barcode:"4901480101016",stock:8,min:20,orderQty:100,unit:"冊"},
  {id:2,name:"ボールペン（青）",cat:"文具",barcode:"4901681200019",stock:3,min:10,orderQty:30,unit:"本"},
  {id:3,name:"付箋 Mサイズ",cat:"文具",barcode:"",stock:15,min:10,orderQty:20,unit:"個"},
  {id:4,name:"ゴミ袋 45L",cat:"清掃用品",barcode:"",stock:0,min:5,orderQty:50,unit:"枚"},
  {id:5,name:"トイレットペーパー",cat:"清掃用品",barcode:"4901750803018",stock:12,min:10,orderQty:48,unit:"ロール"},
  {id:6,name:"単三電池",cat:"電子機器",barcode:"",stock:4,min:8,orderQty:24,unit:"本"},
  {id:7,name:"マスク（不織布）",cat:"その他",barcode:"",stock:30,min:50,orderQty:200,unit:"枚"},
];

let items = [], logs = [], nextId = 100, currentUser = '', editTarget = null;
const pending = {};
let scannerStream = null, scannerDetector = null, scannerMode = 'use', barcodeInputTarget = null;
let lastScanned = null, scannerActive = false;

// ── Storage helpers ──
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({items, nextId})); } catch(e){}
}
function saveLogs() {
  try { localStorage.setItem(LOG_KEY, JSON.stringify(logs.slice(-300))); } catch(e){}
}
function loadData() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) { const d = JSON.parse(r); items = d.items||[]; nextId = d.nextId||100; }
    else { items = JSON.parse(JSON.stringify(DEFAULT_ITEMS)); nextId = 20; saveData(); }
  } catch(e) { items = JSON.parse(JSON.stringify(DEFAULT_ITEMS)); nextId = 20; }
}
function loadLogs() {
  try { const r = localStorage.getItem(LOG_KEY); logs = r ? JSON.parse(r) : []; }
  catch(e) { logs = []; }
}

// NOTE: localStorage is per-browser (not truly shared across devices).
// For real multi-user sharing, replace save/load with a backend API call.
// See the README section at the bottom of this file for Firebase integration guide.

// ── Sync status ──
function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot'), txt = document.getElementById('sync-text');
  if (state==='ok') { dot.className='sync-dot ok'; txt.textContent='保存済み'; }
  else if (state==='syncing') { dot.className='sync-dot syncing'; txt.textContent='保存中…'; }
}
function syncNow(silent) {
  if (!silent) setSyncStatus('syncing');
  loadData(); loadLogs();
  setSyncStatus('ok'); renderAll();
}

// ── Status helpers ──
function getStatus(i) {
  if (i.stock===0) return 'out';
  if (i.stock<i.min) return 'critical';
  if (i.stock<i.min*1.5) return 'low';
  return 'ok';
}
const statusLabel = {ok:'正常', low:'在庫少', critical:'発注必要', out:'在庫切れ'};
const barColor = {ok:'#639922', low:'#EF9F27', critical:'#E24B4A', out:'#B4B2A9'};

// ── Logging ──
function addLog(action, detail) {
  const now = new Date();
  logs.push({
    time: now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),
    date: now.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}),
    who: currentUser, action, detail
  });
}

// ── Enter app ──
function enterApp() {
  const name = document.getElementById('username-input').value.trim();
  if (!name) { showToast('名前を入力してください'); return; }
  currentUser = name;
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-chip').textContent = name;
  setSyncStatus('syncing');
  loadData(); loadLogs();
  addLog('入室', `${name}さんがシステムに入室しました`);
  saveLogs(); setSyncStatus('ok');
  renderAll();
  setInterval(() => { saveData(); setSyncStatus('ok'); }, 30000);
}
document.getElementById('username-input').addEventListener('keydown', e => { if (e.key==='Enter') enterApp(); });

// ── Render ──
function renderStats() {
  const crit = items.filter(i=>['critical','out'].includes(getStatus(i))).length;
  const low = items.filter(i=>getStatus(i)==='low').length;
  const ok = items.filter(i=>getStatus(i)==='ok').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">管理品目数</div><div class="stat-value">${items.length}</div></div>
    <div class="stat"><div class="stat-label">発注必要・切れ</div><div class="stat-value red">${crit}</div></div>
    <div class="stat"><div class="stat-label">在庫少</div><div class="stat-value amber">${low}</div></div>
    <div class="stat"><div class="stat-label">正常</div><div class="stat-value green">${ok}</div></div>
  `;
}

function renderCards() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  const fs = document.getElementById('filter-status').value;
  const filtered = items.filter(i => {
    const s = getStatus(i);
    if (fs && s!==fs) return false;
    if (q && !i.name.toLowerCase().includes(q) && !(i.barcode||'').includes(q)) return false;
    return true;
  });
  const list = document.getElementById('item-list');
  if (!filtered.length) { list.innerHTML = `<div class="empty">該当する品目がありません</div>`; return; }
  list.innerHTML = filtered.map(i => {
    const s = getStatus(i);
    const pct = i.min>0 ? Math.min(100,Math.round(i.stock/i.min*100)) : 100;
    return `<div class="item-card">
      <div class="item-top">
        <div>
          <div class="item-name">${i.name}</div>
          <div class="item-cat">${i.cat}</div>
          ${i.barcode ? `<div class="item-barcode">🔖 ${i.barcode}</div>` : '<div class="item-barcode" style="color:var(--text3)">バーコード未登録</div>'}
        </div>
        <span class="badge ${s}">${statusLabel[s]}</span>
      </div>
      <div class="item-bottom">
        <div>
          <div class="qty-ctrl">
            <button class="qty-btn minus" onclick="changeStock(${i.id},-1)" aria-label="1つ減らす">−</button>
            <div class="qty-val" id="qty-val-${i.id}">${i.stock} ${i.unit}</div>
            <button class="qty-btn plus" onclick="changeStock(${i.id},1)" aria-label="1つ増やす">＋</button>
          </div>
          <div class="pbar" style="margin-top:8px"><div class="pfill" id="pbar-${i.id}" style="width:${pct}%;background:${barColor[s]}"></div></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="item-meta">発注点: ${i.min} ${i.unit}</div>
          <button class="btn sm" onclick="openEditModal(${i.id})">⚙ 設定</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderOrderList() {
  const need = items.filter(i => ['critical','out'].includes(getStatus(i)));
  const cnt = document.getElementById('order-cnt');
  if (need.length) { cnt.style.display=''; cnt.textContent=need.length; }
  else cnt.style.display='none';
  const el = document.getElementById('order-list');
  if (!need.length) { el.innerHTML=`<div class="empty">発注が必要な品目はありません 🎉</div>`; return; }
  el.innerHTML = need.map(i => `
    <div class="order-item">
      <div style="font-size:18px">${getStatus(i)==='out'?'🚫':'⚠️'}</div>
      <div class="order-item-info">
        <div class="order-item-name">${i.name}</div>
        <div class="order-item-sub">${i.cat}${i.barcode?' ／ '+i.barcode:''} ／ 現在 ${i.stock}${i.unit} → 発注点 ${i.min}${i.unit}</div>
      </div>
      <div class="order-item-qty">発注 ${i.orderQty}${i.unit}</div>
    </div>
  `).join('');
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!logs.length) { el.innerHTML=`<div class="empty">操作履歴がありません</div>`; return; }
  el.innerHTML = [...logs].reverse().map(l => `
    <div class="log-item">
      <div class="log-time">${l.date||''}<br>${l.time}</div>
      <div class="log-who">${l.who||'—'}</div>
      <div class="log-body"><div class="log-action">${l.action}</div><div class="log-sub">${l.detail}</div></div>
    </div>
  `).join('');
}

function renderSettings() {
  const el = document.getElementById('settings-list');
  el.innerHTML = items.map(i => `
    <div class="item-card">
      <div class="item-top">
        <div>
          <div class="item-name">${i.name}</div>
          <div class="item-cat">${i.cat}</div>
          ${i.barcode ? `<div class="item-barcode">🔖 ${i.barcode}</div>` : `<div class="item-barcode" style="color:var(--red)">⚠ バーコード未登録</div>`}
        </div>
        <button class="btn sm" onclick="openEditModal(${i.id})">⚙ 編集</button>
      </div>
      <div style="font-size:12px;color:var(--text2)">発注点: ${i.min}${i.unit} ／ 発注数: ${i.orderQty}${i.unit}</div>
    </div>
  `).join('');
}

function renderAll() {
  renderStats(); renderCards(); renderOrderList();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab?.id==='tab-log') renderLog();
  if (activeTab?.id==='tab-settings') renderSettings();
}

// ── Change stock ──
function changeStock(id, delta) {
  const i = items.find(x => x.id===id);
  if (!i) return;
  const before = i.stock;
  i.stock = Math.max(0, i.stock+delta);
  if (i.stock===before) return;

  const valEl = document.getElementById(`qty-val-${id}`);
  const barEl = document.getElementById(`pbar-${id}`);
  if (valEl) {
    valEl.textContent = i.stock+' '+i.unit;
    valEl.classList.remove('flash-up','flash-down');
    void valEl.offsetWidth;
    valEl.classList.add(delta>0?'flash-up':'flash-down');
    setTimeout(()=>valEl.classList.remove('flash-up','flash-down'), 600);
  }
  const s = getStatus(i);
  if (barEl) {
    const pct = i.min>0 ? Math.min(100,Math.round(i.stock/i.min*100)) : 100;
    barEl.style.width = pct+'%';
    barEl.style.background = barColor[s];
  }

  addLog(`${delta>0?'入荷':'使用'}: ${i.name}`, `${before}→${i.stock}${i.unit} (${delta>0?'+':''}${delta})`);
  if (s==='critical'||s==='out') addLog(`⚠ 発注検知: ${i.name}`, `在庫 ${i.stock}${i.unit} が発注点 ${i.min}${i.unit} を下回りました`);

  clearTimeout(pending[id]);
  pending[id] = setTimeout(() => {
    setSyncStatus('syncing');
    saveData(); saveLogs();
    setSyncStatus('ok');
    renderStats(); renderOrderList();
  }, 600);
}

// ── Tab ──
function showTab(t) {
  ['dashboard','order','log','settings'].forEach(n => {
    const view = document.getElementById('view-'+n);
    const tab = document.getElementById('tab-'+n);
    if (view) view.classList.toggle('active', n===t);
    if (tab) tab.classList.toggle('active', n===t);
  });
  const fab = document.getElementById('scan-fab');
  fab.style.display = (t==='dashboard') ? 'flex' : 'none';
  if (t==='log') renderLog();
  if (t==='settings') renderSettings();
}

// ── Modals ──
function openAddModal() { document.getElementById('modal-add').classList.add('open'); }
function openEditModal(id) {
  const i = items.find(x=>x.id===id); editTarget=id;
  document.getElementById('edit-name-label').textContent = i.name;
  document.getElementById('edit-barcode').value = i.barcode||'';
  document.getElementById('edit-min').value = i.min;
  document.getElementById('edit-oqty').value = i.orderQty;
  document.getElementById('edit-unit').value = i.unit;
  document.getElementById('modal-edit').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function addItem() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { showToast('品目名を入力してください'); return; }
  const barcode = document.getElementById('new-barcode').value.trim();
  if (barcode && items.find(i=>i.barcode===barcode)) { showToast('このバーコードはすでに登録済みです'); return; }
  const item = {
    id: nextId++, name, cat: document.getElementById('new-cat').value, barcode,
    stock: parseInt(document.getElementById('new-stock').value)||0,
    min: parseInt(document.getElementById('new-min').value)||1,
    orderQty: parseInt(document.getElementById('new-oqty').value)||1,
    unit: document.getElementById('new-unit').value||'個'
  };
  items.push(item);
  addLog(`品目追加: ${name}`, `在庫:${item.stock}${item.unit} / 発注点:${item.min}${item.unit}${barcode?' / BC:'+barcode:''}`);
  setSyncStatus('syncing'); saveData(); saveLogs(); setSyncStatus('ok');
  closeModal('modal-add');
  document.getElementById('new-name').value=''; document.getElementById('new-barcode').value='';
  renderAll(); showToast(`「${name}」を追加しました`);
}

function saveEdit() {
  const i = items.find(x=>x.id===editTarget);
  const barcode = document.getElementById('edit-barcode').value.trim();
  if (barcode && barcode!==i.barcode && items.find(x=>x.barcode===barcode && x.id!==editTarget)) {
    showToast('このバーコードはすでに登録済みです'); return;
  }
  i.barcode = barcode;
  i.min = parseInt(document.getElementById('edit-min').value)||1;
  i.orderQty = parseInt(document.getElementById('edit-oqty').value)||1;
  i.unit = document.getElementById('edit-unit').value||i.unit;
  addLog(`設定更新: ${i.name}`, `発注点:${i.min}${i.unit} / BC:${i.barcode||'未登録'}`);
  setSyncStatus('syncing'); saveData(); saveLogs(); setSyncStatus('ok');
  closeModal('modal-edit'); renderAll(); showToast('保存しました');
}

function deleteItem() {
  const i = items.find(x=>x.id===editTarget);
  if (!confirm(`「${i.name}」を削除しますか？`)) return;
  items = items.filter(x=>x.id!==editTarget);
  addLog(`品目削除: ${i.name}`, '削除されました');
  saveData(); saveLogs(); closeModal('modal-edit'); renderAll();
  showToast(`「${i.name}」を削除しました`);
}

// ── Barcode Scanner ──
async function openScanner() {
  if (!('BarcodeDetector' in window)) {
    showToast('このブラウザはバーコードスキャンに非対応です（Chrome/Safari推奨）');
    return;
  }
  scannerMode = 'use';
  lastScanned = null;
  document.getElementById('scanner-result').style.display = 'none';
  document.getElementById('scanner-hint').textContent = 'バーコードをフレーム内に合わせてください';
  document.getElementById('scanner-overlay').classList.add('open');
  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    const video = document.getElementById('scanner-video');
    video.srcObject = scannerStream;
    await video.play();
    scannerDetector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code'] });
    scannerActive = true;
    detectLoop();
  } catch(e) {
    closeScanner();
    showToast('カメラへのアクセスが許可されていません');
  }
}

async function detectLoop() {
  if (!scannerActive) return;
  const video = document.getElementById('scanner-video');
  try {
    if (video.readyState >= 2) {
      const barcodes = await scannerDetector.detect(video);
      if (barcodes.length > 0) {
        const code = barcodes[0].rawValue;
        if (code !== lastScanned) {
          lastScanned = code;
          handleScan(code);
        }
      }
    }
  } catch(e){}
  if (scannerActive) setTimeout(detectLoop, 300);
}

function handleScan(code) {
  if (scannerMode === 'input') {
    barcodeInputTarget.value = code;
    closeScanner();
    showToast(`バーコード取得: ${code}`);
    return;
  }
  const found = items.find(i => i.barcode === code);
  const resultEl = document.getElementById('scanner-result');
  const contentEl = document.getElementById('scanner-result-content');
  resultEl.style.display = 'block';
  if (found) {
    const s = getStatus(found);
    contentEl.innerHTML = `
      <h3>📦 品目が見つかりました</h3>
      <div class="scanner-result-item">
        <div class="scanner-result-info">
          <div class="scanner-result-name">${found.name}</div>
          <div class="scanner-result-sub">${found.cat} ／ 現在 ${found.stock}${found.unit} ／ <span class="badge ${s}" style="font-size:10px">${statusLabel[s]}</span></div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn minus" onclick="scanChangeStock(${found.id},-1)">−</button>
          <div class="qty-val" id="scan-qty-val">${found.stock} ${found.unit}</div>
          <button class="qty-btn plus" onclick="scanChangeStock(${found.id},1)">＋</button>
        </div>
      </div>
      <div class="scanner-actions">
        <button class="btn sm" onclick="lastScanned=null;document.getElementById('scanner-result').style.display='none'">🔄 続けてスキャン</button>
        <button class="btn sm primary" onclick="closeScanner()">完了</button>
      </div>
    `;
  } else {
    contentEl.innerHTML = `
      <div class="scanner-not-found">
        <div class="barcode-display">${code}</div>
        <p>このバーコードは登録されていません</p>
        <div class="scanner-actions" style="justify-content:center">
          <button class="btn sm" onclick="registerFromScan('${code}')">＋ この商品を登録する</button>
          <button class="btn sm" onclick="lastScanned=null;document.getElementById('scanner-result').style.display='none'">🔄 再スキャン</button>
        </div>
      </div>
    `;
  }
}

function scanChangeStock(id, delta) {
  changeStock(id, delta);
  const i = items.find(x=>x.id===id);
  const el = document.getElementById('scan-qty-val');
  if (el) { el.textContent = i.stock+' '+i.unit; }
}

function registerFromScan(code) {
  closeScanner();
  document.getElementById('new-barcode').value = code;
  openAddModal();
  setTimeout(()=>document.getElementById('new-name').focus(), 300);
}

function startBarcodeInputScan() {
  barcodeInputTarget = document.getElementById('new-barcode');
  scannerMode = 'input';
  openScanner();
}
function startBarcodeEditScan() {
  barcodeInputTarget = document.getElementById('edit-barcode');
  scannerMode = 'input';
  openScanner();
}

function closeScanner() {
  scannerActive = false;
  if (scannerStream) { scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; }
  document.getElementById('scanner-overlay').classList.remove('open');
  document.getElementById('scanner-video').srcObject = null;
  lastScanned = null;
  renderAll();
}

// ── Export ──
function copyOrder() {
  const need = items.filter(i=>['critical','out'].includes(getStatus(i)));
  if (!need.length) { showToast('発注が必要な品目はありません'); return; }
  const text = '【発注リスト】\n'+new Date().toLocaleDateString('ja-JP')+'\n\n'+
    need.map((i,n)=>`${n+1}. ${i.name}（${i.cat}）\n   現在: ${i.stock}${i.unit} / 発注数: ${i.orderQty}${i.unit}${i.barcode?'\n   BC: '+i.barcode:''}`).join('\n\n');
  navigator.clipboard.writeText(text).then(()=>showToast('発注リストをコピーしました'));
}

function exportCSV() {
  const need = items.filter(i=>['critical','out'].includes(getStatus(i)));
  if (!need.length) { showToast('発注が必要な品目はありません'); return; }
  const rows = [['品目名','バーコード','カテゴリ','現在庫','発注点','発注数量','単位','状態']];
  need.forEach(i=>rows.push([i.name,i.barcode||'',i.cat,i.stock,i.min,i.orderQty,i.unit,statusLabel[getStatus(i)]]));
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = '発注リスト_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.csv';
  a.click();
}

function exportPDF() {
  const need = items.filter(i=>['critical','out'].includes(getStatus(i)));
  if (!need.length) { showToast('発注が必要な品目はありません'); return; }
  const now = new Date();
  document.getElementById('pdf-date').textContent = '出力日時: '+now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'})+' '+now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('pdf-author').textContent = currentUser;
  document.getElementById('pdf-total').textContent = `発注品目数: ${need.length}件`;
  const outN=need.filter(i=>getStatus(i)==='out').length, critN=need.filter(i=>getStatus(i)==='critical').length;
  document.getElementById('pdf-summary').innerHTML = `
    <div style="background:#FCEBEB;border-radius:8px;padding:10px 14px;flex:1"><div style="font-size:10px;font-weight:700;color:#A32D2D;margin-bottom:3px">在庫切れ</div><div style="font-size:22px;font-weight:700;color:#A32D2D">${outN}<span style="font-size:12px;margin-left:3px">品目</span></div></div>
    <div style="background:#FAEEDA;border-radius:8px;padding:10px 14px;flex:1"><div style="font-size:10px;font-weight:700;color:#854F0B;margin-bottom:3px">発注必要</div><div style="font-size:22px;font-weight:700;color:#854F0B">${critN}<span style="font-size:12px;margin-left:3px">品目</span></div></div>
    <div style="background:#E6F1FB;border-radius:8px;padding:10px 14px;flex:1"><div style="font-size:10px;font-weight:700;color:#185FA5;margin-bottom:3px">合計</div><div style="font-size:22px;font-weight:700;color:#185FA5">${need.length}<span style="font-size:12px;margin-left:3px">品目</span></div></div>
  `;
  const sc={critical:'#A32D2D',out:'#5F5E5A'}, sb={critical:'#FCEBEB',out:'#F1EFE8'};
  document.getElementById('pdf-tbody').innerHTML = need.map((i,idx)=>{
    const s=getStatus(i);
    return`<tr style="background:${idx%2?'#f9f9f9':'#fff'}">
      <td style="padding:7px 8px 7px 0;color:#888;font-size:11px">${idx+1}</td>
      <td style="padding:7px 8px;font-weight:600">${i.name}</td>
      <td style="padding:7px 8px;font-family:monospace;font-size:11px;color:#555">${i.barcode||'—'}</td>
      <td style="padding:7px 8px;color:#555">${i.cat}</td>
      <td style="padding:7px 8px;text-align:right;color:#A32D2D;font-weight:600">${i.stock} ${i.unit}</td>
      <td style="padding:7px 8px;text-align:right;color:#555">${i.min} ${i.unit}</td>
      <td style="padding:7px 8px;text-align:right;font-weight:700;color:#185FA5">${i.orderQty} ${i.unit}</td>
      <td style="padding:7px 0 7px 8px;text-align:center"><span style="background:${sb[s]};color:${sc[s]};padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600">${statusLabel[s]}</span></td>
    </tr>`;
  }).join('');
  const tmpl = document.getElementById('pdf-template');
  tmpl.style.display = 'block';
  setTimeout(()=>{ window.print(); setTimeout(()=>{ tmpl.style.display='none'; },800); }, 100);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── Close modals on backdrop click ──
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
</script>
